; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:sparkfun_promicro16]
platform = atmelavr
board = sparkfun_promicro16
framework = arduino
; HID-Project gives us a BootKeyboard plus RawHID (bidirectional), so the host
; can reconfigure the device over HID with no CDC serial port.
lib_deps = nicohood/HID-Project@^2.8.4

; USB product string shown in Device Manager / as the COM port name.
; (Manufacturer stays "SparkFun" — the core hardcodes it for VID 0x1B4F.)
board_build.usb_product = "ButtonMash"

; Custom application PID (0xB175) so Windows sees a brand-new device and uses
; the descriptor name ("ButtonMash") instead of a cached/INF-supplied name.
; 0xB175 is unclaimed by any installed INF (0x9206/0x9207 etc. are taken, and a
; matching INF overrides the descriptor name). Drop the auto-injected 0x9206
; from hwids[0] and define our own.
build_unflags = -DUSB_PID=0x9206
; -DCDC_DISABLED removes the USB CDC serial interface entirely, making this a
; keyboard-only (HID) device — no COM port. Note: this also disables the
; 1200bps-touch auto-reset, so reflashing requires the HID "enter bootloader"
; command or a hardware double-tap of RST->GND (see README).
build_flags =
  -DUSB_PID=0xB175
  -DCDC_DISABLED
